<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeVox — Голосовой помощник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #0f0f23);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .app {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .decox-emoji {
            font-size: 72px;
            filter: drop-shadow(0 0 15px rgba(255,165,0,0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            color: white;
            font-size: 28px;
            margin: 12px 0 8px;
            letter-spacing: 1px;
        }
        .sub {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .sound-hint {
            background: rgba(255,200,100,0.15);
            border: 1px solid rgba(255,200,100,0.4);
            border-radius: 50px;
            padding: 10px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #ffcc88;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        .ask-button {
            width: 100%;
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            border: none;
            border-radius: 60px;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .ask-button:active {
            transform: scale(0.97);
        }
        .status {
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            color: #88ff88;
            margin-bottom: 24px;
            transition: all 0.2s;
            word-break: break-word;
        }
        .compact-player {
            background: rgba(0,0,0,0.4);
            border-radius: 50px;
            padding: 8px 12px;
            margin-top: 8px;
        }
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .player-controls button {
            background: rgba(255,255,255,0.12);
            border: none;
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 12px;
            color: white;
            cursor: pointer;
        }
        .player-controls button:active {
            background: #ffaa44;
            color: #1a1a2e;
        }
        .track-name {
            font-size: 10px;
            color: #888;
            text-align: center;
            margin-top: 6px;
        }
        .footer {
            font-size: 10px;
            color: #555;
            margin-top: 20px;
        }
        hr {
            border-color: rgba(255,255,255,0.1);
            margin: 16px 0;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <div class="decox-emoji">🐺🎧</div>
        <h1>DeVox</h1>
        <div class="sub">Голосовой помощник в путешествиях</div>

        <!-- ПОДСКАЗКА ПРО ЗВУК И НАУШНИКИ -->
        <div class="sound-hint" id="soundHint">
            🎧 Одень наушники для лучшего эффекта 🔊
        </div>

        <!-- ГЛАВНАЯ КНОПКА -->
        <button class="ask-button" id="askBtn">
            🎤 Спросить DeVox
        </button>

        <!-- СТАТУС (без текста ответа) -->
        <div class="status" id="status">
            🐺 Нажми и задай вопрос о путешествиях
        </div>

        <!-- МУЗЫКАЛЬНЫЙ ПЛЕЕР (компактный) -->
        <div class="compact-player">
            <div class="player-controls">
                <button id="playMusicBtn">▶️ Play</button>
                <button id="pauseMusicBtn">⏸️ Пауза</button>
                <button id="stopMusicBtn">⏹️ Стоп</button>
                <button id="volUp">🔊+</button>
                <button id="volDown">🔉-</button>
            </div>
            <div class="track-name" id="trackName">🎵 DeVox Music · Тестовое пианино</div>
        </div>
        <div class="footer">
            🐺 Спрашивай про города, погоду, еду и достопримечательности
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== НАСТРОЙКИ ==========
        // ВАЖНО: замени URL на адрес твоего бота на Render
        const BOT_URL = 'https://devox-bot.onrender.com';
        // ================================

        // --- ГОЛОСОВОЙ ИИ (без текста, только голос) ---
        let audioContext = null;
        let currentVoiceAudio = null;
        let recognition = null;
        
        const statusDiv = document.getElementById('status');
        let useSpeechRecognition = false;

        // Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            useSpeechRecognition = true;
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }

        // Активация аудиоконтекста (обход автовоспроизведения)
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const gain = audioContext.createGain();
                gain.gain.value = 0;
                gain.connect(audioContext.destination);
                const osc = audioContext.createOscillator();
                osc.connect(gain);
                osc.start();
                osc.stop(0.01);
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // Отправка в бот и автоматическое воспроизведение голоса (без текста)
        async function askAndSpeak(questionText) {
            statusDiv.innerHTML = "🤔 Думаю...";
            try {
                // 1. Отправляем вопрос на /ask
                const response = await fetch(`${BOT_URL}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: questionText, lang: 'ru' })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const answer = data.answer || "Извините, не удалось получить ответ.";
                
                // 2. Получаем аудио от бота через /tts
                statusDiv.innerHTML = "🎧 Отвечаю голосом...";
                const ttsResponse = await fetch(`${BOT_URL}/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: answer, lang: 'ru' })
                });
                
                if (ttsResponse.ok) {
                    const audioBlob = await ttsResponse.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    if (currentVoiceAudio) {
                        currentVoiceAudio.pause();
                        currentVoiceAudio = null;
                    }
                    currentVoiceAudio = new Audio(audioUrl);
                    currentVoiceAudio.play();
                    currentVoiceAudio.onended = () => {
                        URL.revokeObjectURL(audioUrl);
                        statusDiv.innerHTML = "✅ Готов к следующему вопросу";
                    };
                } else {
                    // fallback: браузерный голос
                    const utterance = new SpeechSynthesisUtterance(answer);
                    utterance.lang = 'ru-RU';
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                    utterance.onend = () => {
                        statusDiv.innerHTML = "✅ Готов к следующему вопросу";
                    };
                }
            } catch (error) {
                console.error('Ошибка:', error);
                statusDiv.innerHTML = "❌ Ошибка связи. Попробуйте позже";
            }
        }

        // Запись голоса пользователя
        function startVoiceInput() {
            if (!useSpeechRecognition) {
                statusDiv.innerHTML = "❌ Ваш браузер не поддерживает голосовой ввод";
                return;
            }
            initAudioContext();
            statusDiv.innerHTML = "🎤 Слушаю... задайте вопрос";
            recognition.start();
        }

        if (recognition) {
            recognition.onresult = (event) => {
                const question = event.results[0][0].transcript;
                statusDiv.innerHTML = `🎤 Спросил: "${question.substring(0, 40)}${question.length > 40 ? '…' : ''}"`;
                askAndSpeak(question);
            };
            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    statusDiv.innerHTML = "❌ Нет доступа к микрофону. Разрешите доступ";
                } else {
                    statusDiv.innerHTML = "❌ Не распознал. Попробуйте ещё раз";
                }
            };
            recognition.onend = () => {
                if (statusDiv.innerHTML.includes("Слушаю")) {
                    statusDiv.innerHTML = "🐺 Нажми «Спросить» и задай вопрос";
                }
            };
        }

        // Кнопка «Спросить»
        document.getElementById('askBtn').onclick = () => {
            initAudioContext();
            startVoiceInput();
        };

        // --- МУЗЫКАЛЬНЫЙ ПЛЕЕР (компактный) ---
        let musicCtx = null;
        let musicOsc = null;
        let musicGain = null;
        let isMusicOn = false;

        function initMusicCtx() {
            if (!musicCtx) {
                musicCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (musicCtx.state === 'suspended') {
                musicCtx.resume();
            }
        }

        function playMusic() {
            initMusicCtx();
            if (musicOsc) {
                try { musicOsc.stop(); } catch(e) {}
            }
            musicOsc = musicCtx.createOscillator();
            musicGain = musicCtx.createGain();
            musicOsc.connect(musicGain);
            musicGain.connect(musicCtx.destination);
            musicOsc.type = 'sine';
            musicOsc.frequency.value = 440;
            musicGain.gain.value = 0.15;
            musicOsc.start();
            musicGain.gain.exponentialRampToValueAtTime(0.00001, musicCtx.currentTime + 2);
            isMusicOn = true;
            document.getElementById('trackName').innerHTML = "🎵 Играет пианино (2 сек)";
            setTimeout(() => {
                if (isMusicOn) {
                    document.getElementById('trackName').innerHTML = "🎵 DeVox Music · Готово";
                }
            }, 2000);
        }

        function stopMusic() {
            if (musicOsc) {
                try { musicOsc.stop(); } catch(e) {}
                musicOsc = null;
            }
            if (musicCtx) {
                musicCtx.close();
                musicCtx = null;
            }
            isMusicOn = false;
            document.getElementById('trackName').innerHTML = "🎵 Остановлено";
            setTimeout(() => {
                document.getElementById('trackName').innerHTML = "🎵 DeVox Music · Тестовое пианино";
            }, 1200);
        }

        document.getElementById('playMusicBtn').onclick = () => playMusic();
        document.getElementById('pauseMusicBtn').onclick = () => {
            if (musicOsc) {
                try { musicOsc.stop(); } catch(e) {}
                musicOsc = null;
            }
            isMusicOn = false;
            document.getElementById('trackName').innerHTML = "🎵 Пауза";
        };
        document.getElementById('stopMusicBtn').onclick = () => stopMusic();
        document.getElementById('volUp').onclick = () => {
            if (musicGain) musicGain.gain.value = Math.min(0.4, musicGain.gain.value + 0.05);
        };
        document.getElementById('volDown').onclick = () => {
            if (musicGain) musicGain.gain.value = Math.max(0, musicGain.gain.value - 0.05);
        };
    </script>
</body>
</html>
