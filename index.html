<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeVox — Голосовой помощник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
        }
        .app {
            background: #0f0f0f;
            border-radius: 32px;
            padding: 20px 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .decox-emoji {
            font-size: 56px;
            text-align: center;
            filter: drop-shadow(0 0 15px rgba(255,165,0,0.6));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        h1 {
            color: white;
            font-size: 24px;
            text-align: center;
            margin: 8px 0 2px;
            font-weight: 600;
        }
        .sub {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-bottom: 16px;
        }
        /* КАРТОЧКА ЛОКАЦИИ И ПОГОДЫ */
        .info-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .location-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .location-header span:first-child {
            font-size: 18px;
        }
        .location-header span:last-child {
            color: #ffaa44;
            font-weight: 500;
            font-size: 13px;
            word-break: break-word;
            flex: 1;
        }
        .weather-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .weather-temp {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        .weather-desc {
            color: #aaa;
            font-size: 14px;
        }
        .weather-meta {
            display: flex;
            gap: 16px;
            margin: 8px 0;
            font-size: 12px;
            color: #888;
        }
        .ai-tip {
            background: rgba(255,200,100,0.1);
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 12px;
            color: #ffcc88;
            margin-top: 8px;
        }
        .ask-button {
            width: 100%;
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            transition: transform 0.05s ease;
        }
        .ask-button:active {
            transform: scale(0.97);
        }
        .status {
            background: rgba(255,255,255,0.05);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 12px;
            color: #88ff88;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .compact-player {
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 8px 12px;
            margin-top: 8px;
        }
        .marquee-container {
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            padding: 5px 10px;
            margin-bottom: 8px;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee {
            display: inline-block;
            animation: scroll 10s linear infinite;
            color: #ffaa44;
            font-size: 10px;
        }
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .player-controls button {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 11px;
            color: #ddd;
            cursor: pointer;
            transition: 0.1s;
        }
        .player-controls button:active {
            background: #ffaa44;
            color: #1a1a1a;
        }
        .track-name {
            font-size: 9px;
            color: #666;
            text-align: center;
            margin-top: 6px;
        }
        .footer {
            font-size: 9px;
            color: #444;
            text-align: center;
            margin-top: 14px;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <div class="decox-emoji">🐺🎧</div>
        <h1>DeVox</h1>
        <div class="sub">Голосовой помощник в путешествиях</div>

        <!-- КАРТОЧКА С МЕСТОПОЛОЖЕНИЕМ И ПОГОДОЙ -->
        <div class="info-card" id="infoCard">
            <div class="location-header">
                <span>📍</span>
                <span id="locationName">Определение...</span>
            </div>
            <div id="weatherBlock">
                <div class="weather-row">
                    <span class="weather-temp" id="weatherTemp">--°C</span>
                    <span class="weather-desc" id="weatherDesc">--</span>
                </div>
                <div class="weather-meta" id="weatherMeta">
                    💨 -- м/с &nbsp;|&nbsp; 💧 --%
                </div>
                <div class="ai-tip" id="weatherTip">
                    ✨ Загрузка...
                </div>
            </div>
        </div>

        <button class="ask-button" id="askBtn">
            🎤 Спросить DeVox
        </button>

        <div class="status" id="status">
            🐺 Нажми и задай вопрос
        </div>

        <div class="compact-player">
            <div class="marquee-container">
                <div class="marquee" id="marqueeText">
                    🎵 DeVox FM — музыка для дороги 🐺✨
                </div>
            </div>
            <div class="player-controls">
                <button id="playMusicBtn">▶️ Play</button>
                <button id="pauseMusicBtn">⏸️ Пауза</button>
                <button id="stopMusicBtn">⏹️ Стоп</button>
                <button id="volUp">🔊+</button>
                <button id="volDown">🔉-</button>
            </div>
            <div class="track-name" id="trackName">🎵 DeVox Music · тестовое пианино</div>
        </div>

        <div class="footer">
            🐺 Спрашивай про города, погоду, еду и достопримечательности
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const BOT_URL = 'https://devox-bot.onrender.com';  // ЗАМЕНИ НА СВОЙ URL
        let currentLang = 'ru';
        let currentLat = null;
        let currentLon = null;
        let watchId = null;
        let updateInterval = null;
        let isUpdating = false;
        let retryCount = 0;
        const MAX_RETRY = 3;
        
        // Кэш в localStorage
        const CACHE_TTL = 300000; // 5 минут
        
        function saveToCache(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify({
                    data: data,
                    expires: Date.now() + CACHE_TTL
                }));
            } catch(e) { console.warn('Cache save error', e); }
        }
        
        function getFromCache(key) {
            try {
                const item = localStorage.getItem(key);
                if (!item) return null;
                const parsed = JSON.parse(item);
                if (Date.now() > parsed.expires) {
                    localStorage.removeItem(key);
                    return null;
                }
                return parsed.data;
            } catch(e) { return null; }
        }
        
        function saveLastLocation(lat, lon) {
            localStorage.setItem('last_lat', lat);
            localStorage.setItem('last_lon', lon);
            localStorage.setItem('last_lang', currentLang);
        }
        
        function loadLastLocation() {
            const lat = localStorage.getItem('last_lat');
            const lon = localStorage.getItem('last_lon');
            const lang = localStorage.getItem('last_lang');
            if (lat && lon) {
                currentLat = parseFloat(lat);
                currentLon = parseFloat(lon);
                if (lang) currentLang = lang;
                return true;
            }
            return false;
        }
        
        // ========== ОПРЕДЕЛЕНИЕ ЯЗЫКА ПО ТЕКСТУ ==========
        function detectLanguage(text) {
            if (/[а-яё]/i.test(text)) return 'ru';
            if (/[éèêëàâçîïûü]/i.test(text)) return 'fr';
            if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(text)) return 'zh';
            if (/[a-z]/i.test(text)) return 'en';
            return currentLang;
        }
        
        // ========== ОБНОВЛЕНИЕ ЭКРАНА (АДРЕС + ПОГОДА) ==========
        async function updateLocationAndWeather(lat, lon, lang, force = false) {
            if (isUpdating && !force) return;
            isUpdating = true;
            
            const cacheKey = `weather_${lat.toFixed(4)}_${lon.toFixed(4)}_${lang}`;
            
            // Пытаемся взять из кэша
            if (!force) {
                const cached = getFromCache(cacheKey);
                if (cached) {
                    applyWeatherData(cached);
                    isUpdating = false;
                    return;
                }
            }
            
            try {
                // 1. Получаем адрес
                const locRes = await fetch(`${BOT_URL}/location`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon, lang })
                });
                if (locRes.ok) {
                    const locData = await locRes.json();
                    document.getElementById('locationName').innerHTML = locData.address || `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                } else {
                    document.getElementById('locationName').innerHTML = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                }
                
                // 2. Получаем погоду через новый эндпоинт
                const weatherRes = await fetch(`${BOT_URL}/weather_voice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon, lang })
                });
                
                if (weatherRes.ok) {
                    const weatherData = await weatherRes.json();
                    if (weatherData.error) throw new Error(weatherData.error);
                    
                    // Сохраняем в кэш
                    saveToCache(cacheKey, weatherData);
                    applyWeatherData(weatherData);
                    retryCount = 0;
                } else {
                    throw new Error('Weather API error');
                }
            } catch (e) {
                console.warn("Ошибка обновления:", e);
                if (retryCount < MAX_RETRY) {
                    retryCount++;
                    setTimeout(() => {
                        updateLocationAndWeather(lat, lon, lang, true);
                    }, 2000);
                } else {
                    document.getElementById('locationName').innerHTML = "⚠️ Ошибка связи";
                    document.getElementById('status').innerHTML = "❌ Не удалось обновить данные";
                    retryCount = 0;
                }
            } finally {
                isUpdating = false;
            }
        }
        
        function applyWeatherData(data) {
            document.getElementById('weatherTemp').innerHTML = `${data.temp}°C`;
            document.getElementById('weatherDesc').innerHTML = data.condition;
            document.getElementById('weatherMeta').innerHTML = `💨 ${data.wind} м/с &nbsp;|&nbsp; 💧 ${data.humidity}%`;
            document.getElementById('weatherTip').innerHTML = `✨ ${data.advice}`;
        }
        
        // ========== ОЗВУЧКА ЧЕРЕЗ БОТА (с получением советов) ==========
        async function speakViaBot(text, lang) {
            try {
                const ttsResponse = await fetch(`${BOT_URL}/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, lang })
                });
                if (ttsResponse.ok) {
                    const audioBlob = await ttsResponse.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                } else {
                    throw new Error("TTS failed");
                }
            } catch (e) {
                // fallback: браузерный голос
                const utterance = new SpeechSynthesisUtterance(text);
                const langMap = { ru: 'ru-RU', en: 'en-US', fr: 'fr-FR', zh: 'zh-CN' };
                utterance.lang = langMap[lang] || 'ru-RU';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }
        
        // ========== ПОЛУЧЕНИЕ ПОГОДЫ ДЛЯ ГОЛОСА ==========
        async function getWeatherVoiceData(lat, lon, lang) {
            try {
                const res = await fetch(`${BOT_URL}/weather_voice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon, lang })
                });
                if (res.ok) {
                    return await res.json();
                }
                return null;
            } catch (e) {
                console.warn(e);
                return null;
            }
        }
        
        // ========== ОБРАБОТКА ГОЛОСОВЫХ КОМАНД ==========
        async function processVoiceCommand(questionText, lang) {
            const lower = questionText.toLowerCase();
            
            // Команда "Где я?"
            if (lower.includes('где я') || lower.includes('where am i') || 
                lower.includes('où suis-je') || lower.includes('我在哪里')) {
                const address = document.getElementById('locationName').innerText;
                const answer = `Вы находитесь: ${address}`;
                statusDiv.innerHTML = "📍 " + answer;
                await speakViaBot(answer, lang);
                return true;
            }
            
            // Команда "Погода" — получаем свежие данные с советом
            if (lower.includes('погода') || lower.includes('weather') || 
                lower.includes('temps') || lower.includes('天气')) {
                if (currentLat && currentLon) {
                    statusDiv.innerHTML = "🌤️ Получаю погоду...";
                    const weatherData = await getWeatherVoiceData(currentLat, currentLon, lang);
                    if (weatherData && weatherData.voice_text) {
                        // Обновляем UI свежими данными
                        applyWeatherData(weatherData);
                        await speakViaBot(weatherData.voice_text, lang);
                        statusDiv.innerHTML = "✅ Погода озвучена";
                    } else {
                        const answer = "Не удалось получить данные о погоде";
                        await speakViaBot(answer, lang);
                        statusDiv.innerHTML = "❌ " + answer;
                    }
                } else {
                    const answer = "Сначала определите ваше местоположение";
                    await speakViaBot(answer, lang);
                    statusDiv.innerHTML = "📍 " + answer;
                }
                return true;
            }
            return false;
        }
        
        // ========== ОСНОВНАЯ ФУНКЦИЯ ОТПРАВКИ В БОТ ==========
        async function askAndSpeak(questionText, lang) {
            const isCommand = await processVoiceCommand(questionText, lang);
            if (isCommand) return;
            
            statusDiv.innerHTML = "🤔 Думаю...";
            try {
                const response = await fetch(`${BOT_URL}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: questionText, lang })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const answer = data.answer || "Извините, не удалось получить ответ.";
                statusDiv.innerHTML = "🎧 Отвечаю голосом...";
                await speakViaBot(answer, lang);
                statusDiv.innerHTML = "✅ Готов к следующему вопросу";
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = "❌ Ошибка связи. Попробуйте позже";
            }
        }
        
        // ========== ГЕОЛОКАЦИЯ С ОТСЛЕЖИВАНИЕМ ПЕРЕМЕЩЕНИЯ ==========
        function startWatchingLocation() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
            }
            
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const newLat = position.coords.latitude;
                    const newLon = position.coords.longitude;
                    
                    // Проверяем, изменилась ли позиция (больше 50 метров)
                    if (currentLat && currentLon) {
                        const dist = Math.sqrt(Math.pow(newLat - currentLat, 2) + Math.pow(newLon - currentLon, 2)) * 111000;
                        if (dist < 50) return; // не обновляем, если сдвиг меньше 50м
                    }
                    
                    currentLat = newLat;
                    currentLon = newLon;
                    saveLastLocation(currentLat, currentLon);
                    updateLocationAndWeather(currentLat, currentLon, currentLang);
                },
                (error) => {
                    console.warn("Геолокация ошибка:", error);
                    if (error.code === 1) {
                        document.getElementById('locationName').innerHTML = "📍 Геолокация запрещена";
                        document.getElementById('status').innerHTML = "📍 Разрешите геолокацию в браузере";
                    } else if (loadLastLocation()) {
                        updateLocationAndWeather(currentLat, currentLon, currentLang);
                    }
                },
                { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
            );
        }
        
        // ========== АВТООБНОВЛЕНИЕ КАЖДЫЕ 5 МИНУТ ==========
        function startAutoUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                if (currentLat && currentLon) {
                    updateLocationAndWeather(currentLat, currentLon, currentLang, true);
                }
            }, 300000);
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ АУДИОКОНТЕКСТА ==========
        function initAudioContext() {
            if (!window.audioContext) {
                window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const gain = window.audioContext.createGain();
                gain.gain.value = 0;
                gain.connect(window.audioContext.destination);
                const osc = window.audioContext.createOscillator();
                osc.connect(gain);
                osc.start();
                osc.stop(0.01);
            }
            if (window.audioContext.state === 'suspended') window.audioContext.resume();
        }
        
        // ========== ГОЛОСОВОЙ ВВОД ==========
        let recognition = null;
        const statusDiv = document.getElementById('status');
        let useSpeechRecognition = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            useSpeechRecognition = true;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }
        
        let isListening = false;
        
        function startVoiceInput() {
            if (!useSpeechRecognition) {
                statusDiv.innerHTML = "❌ Ваш браузер не поддерживает голосовой ввод";
                return;
            }
            if (isListening) return;
            
            initAudioContext();
            isListening = true;
            statusDiv.innerHTML = "🎤 Слушаю... задайте вопрос";
            recognition.lang = 'ru-RU';
            recognition.start();
        }
        
        if (recognition) {
            recognition.onstart = () => {
                isListening = true;
            };
            
            recognition.onresult = async (event) => {
                const rawQuestion = event.results[0][0].transcript;
                const detected = detectLanguage(rawQuestion);
                currentLang = detected;
                saveLastLocation(currentLat, currentLon);
                statusDiv.innerHTML = `🎤 (${detected.toUpperCase()}) "${rawQuestion.substring(0, 50)}${rawQuestion.length > 50 ? '…' : ''}"`;
                await askAndSpeak(rawQuestion, detected);
                isListening = false;
            };
            
            recognition.onerror = (event) => {
                console.warn("Speech error:", event.error);
                if (event.error === 'not-allowed') {
                    statusDiv.innerHTML = "❌ Нет доступа к микрофону";
                } else if (event.error === 'no-speech') {
                    statusDiv.innerHTML = "🎤 Не услышал. Попробуйте ещё раз";
                } else {
                    statusDiv.innerHTML = "❌ Ошибка распознавания";
                }
                isListening = false;
            };
            
            recognition.onend = () => {
                if (isListening) {
                    statusDiv.innerHTML = "🐺 Нажмите кнопку для вопроса";
                }
                isListening = false;
            };
        }
        
        document.getElementById('askBtn').onclick = () => {
            initAudioContext();
            startVoiceInput();
        };
        
        // ========== МУЗЫКАЛЬНЫЙ ПЛЕЕР (тестовая версия) ==========
        let musicCtx = null;
        let musicOsc = null;
        let musicGain = null;
        let isMusicOn = false;
        
        function initMusicCtx() {
            if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (musicCtx.state === 'suspended') musicCtx.resume();
        }
        
        function playMusic() {
            initMusicCtx();
            if (musicOsc) try { musicOsc.stop(); } catch(e) {}
            musicOsc = musicCtx.createOscillator();
            musicGain = musicCtx.createGain();
            musicOsc.connect(musicGain);
            musicGain.connect(musicCtx.destination);
            musicOsc.type = 'sine';
            musicOsc.frequency.value = 440;
            musicGain.gain.value = 0.15;
            musicOsc.start();
            musicGain.gain.exponentialRampToValueAtTime(0.00001, musicCtx.currentTime + 2);
            isMusicOn = true;
            document.getElementById('trackName').innerHTML = "🎵 Играет пианино (2 сек)";
            setTimeout(() => { 
                if (isMusicOn) document.getElementById('trackName').innerHTML = "🎵 DeVox Music · тестовое пианино"; 
            }, 2000);
        }
        
        function stopMusic() {
            if (musicOsc) try { musicOsc.stop(); } catch(e) {}
            musicOsc = null;
            if (musicCtx) musicCtx.close();
            musicCtx = null;
            isMusicOn = false;
            document.getElementById('trackName').innerHTML = "🎵 Остановлено";
            setTimeout(() => { 
                document.getElementById('trackName').innerHTML = "🎵 DeVox Music · тестовое пианино"; 
            }, 1200);
        }
        
        document.getElementById('playMusicBtn').onclick = () => playMusic();
        document.getElementById('pauseMusicBtn').onclick = () => {
            if (musicOsc) try { musicOsc.stop(); } catch(e) {}
            musicOsc = null;
            isMusicOn = false;
            document.getElementById('trackName').innerHTML = "🎵 Пауза";
        };
        document.getElementById('stopMusicBtn').onclick = () => stopMusic();
        document.getElementById('volUp').onclick = () => { 
            if (musicGain) musicGain.gain.value = Math.min(0.4, musicGain.gain.value + 0.05); 
        };
        document.getElementById('volDown').onclick = () => { 
            if (musicGain) musicGain.gain.value = Math.max(0, musicGain.gain.value - 0.05); 
        };
        
        // ========== БЕГУЩАЯ СТРОКА ==========
        const marqueeMessages = [
            "🎵 DeVox FM — музыка для дороги",
            "🐺 Волк в наушниках — твой спутник",
            "✨ Спрашивай про города и погоду",
            "🎧 Путешествуй с комфортом"
        ];
        let marqueeIndex = 0;
        function updateMarquee() {
            marqueeIndex = (marqueeIndex + 1) % marqueeMessages.length;
            const marqueeEl = document.getElementById('marqueeText');
            if (marqueeEl) marqueeEl.textContent = marqueeMessages[marqueeIndex];
        }
        setInterval(updateMarquee, 8000);
        
        // ========== ЗАПУСК ==========
        if (loadLastLocation()) {
            updateLocationAndWeather(currentLat, currentLon, currentLang);
            startWatchingLocation();
            startAutoUpdates();
        } else {
            startWatchingLocation();
            startAutoUpdates();
        }
    </script>
</body>
</html>
